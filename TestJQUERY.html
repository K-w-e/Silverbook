<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>

    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 1px;
            height: 1px;
            background-color: white;
        }

        .image{
            position: fixed;
            opacity: 0;
            
        }

        .sx{
            animation: imageToLeftBottom 8s linear;
        }

        .dx{
            animation: imageToRightBottom 8s linear;
        }

        .image:hover{
            -webkit-animation-play-state: paused;
        }
        @keyframes imageToLeftBottom {
            0% {
                top: 20%;
                left: 40%;
                width: 18em;        
                transform: scale(0.1);
                opacity: 0;
            }
            50% {
                top: 40%;
                left: 0%;
                opacity: 1;
                width: 18em;      
            }
            100% {
                top: 60%;
                left: -40%;
                opacity: 1;
                transform: scale(2.75);
                width: 18em;
            }          
        }

        @keyframes imageToRightBottom {
            0% {
                top: 20%;
                right: 40%;
                width: 18em;        
                transform: scale(0.1);
                opacity: 0;
            }
            50% {
                top: 40%;
                right: 0%;
                opacity: 1;
                width: 18em;      
            }
            100% {
                top: 60%;
                right: -40%;
                opacity: 1;
                transform: scale(2.75);
                width: 18em;
            }          
        }

    </style>

</head>
<body>  
    <div class="prova">
        <img class="image test1" src="https://cataas.com/cat" >
        <img class="image test2" src="https://cataas.com/cat/cute" >
        <img class="image test3" src="https://cataas.com/cat/says/hello" >
        <img class="image test4" src="https://cataas.com/cat" >
        <img class="image test5" src="https://cataas.com/cat/cute" >
        <img class="image test6" src="https://cataas.com/cat/says/hello" >
        <img class="image test1" src="https://cataas.com/cat" >
        <img class="image test2" src="https://cataas.com/cat/cute" >
        <img class="image test3" src="https://cataas.com/cat/says/hello" >
        <img class="image test4" src="https://cataas.com/cat" >
        <img class="image test5" src="https://cataas.com/cat/cute" >
        <img class="image test6" src="https://cataas.com/cat/says/hello" >
    </div>  
   


    <script src="https://code.jquery.com/jquery-3.5.0.slim.min.js"></script>
    <script>
        var y;

       $( document ).ready( 
        add()
        );
     
    function add(){
        $("img").each(function (i) {         
            var $x = $(this);
            setTimeout(function () { 
                if(i%2)
                    $x.addClass("dx"); 
                else
                    $x.addClass("sx");
            }, 2000 * (i + 1));
        })

        setTimeout(function(){
            $("img").each( function(x) {
                $(this).removeClass("dx sx");
                
            })
            add();
        }, ($("img").length )*3000)
    }
            





    
    </script>
    <script>
    const numStars = 100;
    for (let i = 0; i < numStars; i++) {
    let star = document.createElement("div");  
    star.className = "star";
    var xy = getRandomPosition();
        star.style.top = xy[0] + 'px';
        star.style.left = xy[1] + 'px';
    document.body.append(star);
    }
    function getRandomPosition() {  
    var y = window.innerWidth;
    var x = window.innerHeight;
        var randomX = Math.floor(Math.random()*x);
        var randomY = Math.floor(Math.random()*y);
        return [randomX,randomY];
    }
    </script>
</body>
</html>
